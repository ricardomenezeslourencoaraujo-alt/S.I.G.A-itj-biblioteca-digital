<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Administrador · SiGA ITJ</title>
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- CSS -->
  <link rel="stylesheet" href="/estatico/css/login_adm.css">
</head>
<body>
  <div class="full-background">

    <!-- SELETOR DE IDIOMA -->
    <div class="language-wrapper">
      <button class="language-button" aria-label="Selecionar idioma">
        <img src="/estatico/css/br.png" class="flag" alt="Bandeira do Brasil" id="current-flag">
        <span id="current-lang-text">PT</span>
        <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5"/></svg>
      </button>
      <ul class="language-list">
        <li data-lang="pt" tabindex="0">
          <img src="/estatico/css/br.png" class="flag" alt="Português"> Português
        </li>
        <li data-lang="en" tabindex="0">
          <img src="/estatico/css/us.png" class="flag" alt="English"> English
        </li>
        <li data-lang="es" tabindex="0">
          <img src="/estatico/css/es.png" class="flag" alt="Español"> Español
        </li>
      </ul>
    </div>

    <!-- CABEÇALHO FIXO -->
    <div class="auth-header">
      <a href="preview.html" class="back-arrow" aria-label="Voltar para página inicial">
        <i class="fas fa-arrow-left"></i>
      </a>
      <a href="preview.html" class="brand-logo">
        <i class="fas fa-book-reader icon-logo"></i> SiGA ITJ
      </a>
    </div>

    <!-- CONTAINER PRINCIPAL -->
    <div class="container">
      <!-- LADO ESQUERDO: PAINEL DECORATIVO -->
      <div class="panel-decorativo">
        <div class="panel-content">
          <div class="shield-icon">
            <i class="fas fa-user-shield"></i>
          </div>
          <h2 id="panel-title">Painel Administrativo</h2>
          <p id="panel-desc">Gerencie sua biblioteca com praticidade.</p>
          <div class="illustration-icons">
            <i class="fas fa-book"></i>
            <i class="fas fa-cogs"></i>
            <i class="fas fa-chart-line"></i>
          </div>
        </div>
      </div>

      <!-- LADO DIREITO: FORMULÁRIO DE LOGIN -->
      <div class="form-container">
        <form id="form-login-adm" autocomplete="off">
          <h1 class="dot-title">Login Adm</h1>

          <div class="error-message" style="display:none;"></div>

          <div class="input-group">
            <input type="email" placeholder="Email" id="admin-email" required>
            <i class="fas fa-envelope icon-input"></i>
          </div>

          <div class="input-group">
            <input type="password" placeholder="Senha" id="admin-password" required>
            <i class="fas fa-eye toggle-eye" id="toggleAdminPassword"></i>
          </div>

          <p class="caps-warning" id="caps_warning_admin">Caps Lock ativado!</p>

          <div class="options-group">
            <label>
              <input type="checkbox">
              <span>Lembrar-me</span>
            </label>
            <a href="#!">Esqueceu a senha?</a>
          </div>

          <div class="buttons-layout">
            <button type="submit" class="btn-primary" id="btn-submit-login">Entrar</button>
          </div>
        </form>
      </div>
    </div>

  </div>

  <!-- JS EXTERNO -->
  <script src="js/login_adm.js"></script>
</body>
</html>
